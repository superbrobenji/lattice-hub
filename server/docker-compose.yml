services:
  kafka:
    container_name: kafka
    hostname: kafka
    image: apache/kafka:3.7.0
    ports:
      - 9092:9092
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://kafka:9094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OTM2NTcxNTJhNDM2YQ
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kafka-net

  orchestrator:
    container_name: orchestrator
    build: ./orchestrator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - orchestrator_data:/app/data
    ports:
      - "8080:8080"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    group_add:
      - "20"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - BAUD_RATE=${BAUD_RATE:-115200}
      - API_PORT=${API_PORT:-8080}
      - KAFKA_BROKER=kafka:9092
      - API_KEY=${API_KEY:?API_KEY is required}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:3001}
      - NODE_REGISTRY_PATH=data/nodes.json
      - ZONE_REGISTRY_PATH=data/zones.json
      - AUTH_REGISTRY_PATH=data/nodeauth.json
    networks:
      - kafka-net
    restart: unless-stopped

  dashboard:
    container_name: dashboard
    build: ./dashboard
    depends_on:
      orchestrator:
        condition: service_healthy
    ports:
      - "3000:3000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - SIDECAR_URL=http://sidecar:9000
      - API_KEY=${API_KEY:?API_KEY is required}
      - ADMIN_KEY=${ADMIN_KEY:?ADMIN_KEY is required}
    networks:
      - kafka-net

  artist-portal:
    container_name: artist-portal
    build:
      context: ./artist-portal
      args:
        VITE_PUBLIC_API_URL: ${ARTIST_API_URL:-http://localhost:8080}
    ports:
      - "3001:3001"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - API_KEY=${API_KEY:?API_KEY is required}
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - kafka-net
    restart: unless-stopped

  sidecar:
    container_name: sidecar
    build: ./sidecar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9000:9000"
    security_opt:
      - no-new-privileges:true
    environment:
      - ADMIN_KEY=${ADMIN_KEY:?ADMIN_KEY is required}
      - KAFKA_BROKER=kafka:9092
      - COMPOSE_PROJECT=${COMPOSE_PROJECT_NAME:-server}
    networks:
      - kafka-net
    restart: unless-stopped

networks:
  kafka-net:
    driver: bridge

volumes:
  orchestrator_data:
