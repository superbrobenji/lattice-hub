syntax = "proto3";
package mesh;

option go_package = "github.com/superbrobenji/motionServer/mesh";

// MeshMessage is the wire format for all ESP-NOW mesh frames (proto v1).
// New fields (8+) are additive — they do not change the encoding of fields 1-7.
message MeshMessage {
  // Field 1-7: unchanged from v0
  uint32 messageType       = 1;  // 0=ADAPTER_DATA, 1=MASTER_BEACON, 2=ENROLLMENT, 3=JOIN_ACK
  sint32 dataType          = 2;  // zigzag: -1=UNKNOWN, 0=PIR, 1=WIFI, 2=LED, 3=SERIAL
  bytes  originMacAddress  = 3;  // 6 bytes
  bytes  targetMacAddress  = 4;  // 6 bytes
  bytes  lastHopMacAddress = 5;  // 6 bytes
  bytes  data              = 6;  // up to 12 bytes
  uint32 hopCount          = 7;

  // Security fields (proto v1, added alongside node firmware security update)
  uint32 protoVersion      = 8;  // Must be 1 for all v1 messages
  uint32 epochNum          = 9;  // Sender's boot epoch (persisted across reboots)
  uint32 seqNum            = 10; // Per-boot sequence counter (uint16 on device, uint32 here)
}

// EnrollmentRequest is sent by master to server when a new node broadcasts a JOIN_REQUEST.
// Carried as a raw serial opcode frame (not protobuf-encoded), see serial.go.
message EnrollmentRequest {
  bytes mac       = 1;  // 6 bytes: MAC of the enrolling node
  bytes publicKey = 2;  // 32 bytes: Curve25519 public key of the enrolling node
}

// EnrollmentApproval is sent by server to master to approve a pending enrollment.
message EnrollmentApproval {
  bytes mac       = 1;  // 6 bytes: MAC of the approved node
  bytes publicKey = 2;  // 32 bytes: approved public key (echo for verification)
}
